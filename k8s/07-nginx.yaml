apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: challenge
spec:
  replicas: 1
  selector:
    matchLabels: { app: nginx }
  template:
    metadata:
      labels: { app: nginx }
    spec:
      automountServiceAccountToken: false
      containers:
        - name: nginx
          image: openresty/openresty:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /usr/local/openresty/nginx/conf/nginx.conf
              subPath: nginx.conf
            - name: dlp-lua
              mountPath: /etc/nginx/lua
            - name: dlp-rules
              mountPath: /etc/nginx/dlp-rules
      volumes:
        - name: nginx-conf
          configMap: { name: nginx-conf }
        - name: dlp-lua
          configMap: { name: dlp-lua }
        - name: dlp-rules
          configMap: { name: dlp-rules }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: challenge
spec:
  type: NodePort
  selector: { app: nginx }
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
