# NOTE on fidelity: in the real challenge, the "service account token"
# check was a genuine per-pod Kubernetes ServiceAccount token validated
# via the cluster's TokenReview API. Recreating that here would mean
# wiring up a TokenReview ClusterRole just for this demo, so instead we
# mount one shared secret at the conventional SA token path and disable
# each pod's real automount. The puzzle (call credential-store in-cluster
# with *a* valid-looking bearer token) is unchanged; only the validation
# mechanism is simplified. See WRITEUP.md.
apiVersion: v1
kind: Secret
metadata:
  name: service-token
  namespace: challenge
type: Opaque
stringData:
  token: "eyJhbGciOiJSUzI1NiJ9.challenge-user-service-account-token-simulated.wiznt-day-one"
---
apiVersion: v1
kind: Secret
metadata:
  name: encryption-key
  namespace: challenge
type: Opaque
stringData:
  encryption-key: "initech-encryption-key-2024"
---
apiVersion: v1
kind: Secret
metadata:
  name: checkpoint7-flag
  namespace: challenge
type: Opaque
stringData:
  checkpoint7-flag: "FLAG{7_1nd3x3s_m4k3_1t_f4st}"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: challenge
type: Opaque
stringData:
  POSTGRES_PASSWORD: "postgres_root_pw"
  DATABASE_CONNECTION_STRING: "postgresql://appuser:dbpassword123@postgres:5432/ctfapp"
