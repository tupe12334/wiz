{% extends "base.html" %}
{% block content %}
<h1>Report Data</h1>

<div class="card">
    <div class="card-header"><h2>New Entry</h2></div>
    <form id="addDataForm">
        <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" placeholder="e.g., custom" required>
        </div>
        <div class="form-group">
            <label for="value">Value</label>
            <input type="number" id="value" name="value" placeholder="e.g., 100" required>
        </div>
        <div class="form-group">
            <label for="encoded_char">Encoded Char</label>
            <input type="number" id="encoded_char" name="encoded_char" placeholder="e.g., 68" required>
        </div>
        <div id="formMsg" class="alert" style="display:none;"></div>
        <button type="submit" class="btn btn-primary">Add Entry</button>
    </form>
</div>

<div class="card">
    <div class="card-header"><h2>Recent Entries</h2></div>
    <table>
        <thead><tr><th>Sequence</th><th>Category</th><th>Value</th><th>Encoded</th><th>Source</th></tr></thead>
        <tbody>
        {% for d in recent_data %}
            <tr>
                <td>{{ d.sequence }}</td><td>{{ d.category }}</td><td>{{ d.value }}</td>
                <td>{{ d.encoded_char }}</td><td>{{ d.source }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
<script>
document.getElementById('addDataForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const category = document.getElementById('category').value;
    const value = document.getElementById('value').value;
    const encoded_char = document.getElementById('encoded_char').value;
    const resp = await fetch('/api/report/data', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'include',
        body: JSON.stringify({category, value, encoded_char}),
    });
    const data = await resp.json();
    const msg = document.getElementById('formMsg');
    msg.style.display = 'block';
    msg.textContent = resp.ok ? 'Entry added.' : (data.error || 'Failed');
    if (resp.ok) setTimeout(() => location.reload(), 500);
});
</script>
{% endblock %}
